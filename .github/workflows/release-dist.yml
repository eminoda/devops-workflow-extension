name: Release dist

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Package dist
        run: |
          cd dist
          zip -r "../devops-workflow-dist-${{ github.ref_name }}.zip" .

      - name: Create GitHub Release and upload dist zip
        uses: softprops/action-gh-release@v2
        with:
          files: devops-workflow-dist-${{ github.ref_name }}.zip
          generate_release_notes: true
